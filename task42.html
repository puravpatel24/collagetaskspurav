<!-- task42.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task 42 - Tooltip z-index Demo</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f2f2f2;
      margin:0;
      padding:20px;
    }

    h2{
      margin:0 0 10px 0;
    }

    .wrap{
      position:relative;
      height:420px;
      background:#fff;
      border:1px solid #ccc;
      border-radius:8px;
      padding:15px;
      overflow:visible; /* tooltip બહાર આવે તો પણ દેખાય */
    }

    .card{
      position:relative;  /* required */
      z-index:10;         /* required */
      width:240px;
      padding:12px;
      border:1px solid #ddd;
      border-radius:10px;
      background:#ffffff;
      box-shadow:0 6px 14px rgba(0,0,0,0.12);
    }

    .card .img{
      height:110px;
      border-radius:8px;
      background:linear-gradient(135deg,#9ad0ff,#ffc1c1);
      margin-bottom:10px;
    }

    .card h3{
      font-size:16px;
      margin:0 0 6px 0;
    }

    .price{
      font-weight:bold;
      color:green;
      margin:0;
    }

    /* tooltip */
    .tooltip{
      position:absolute; /* required */
      z-index:20;        /* required (base) */
      display:none;
      top:-8px;
      left:10px;
      transform:translateY(-100%);
      background:#111;
      color:#fff;
      padding:8px 10px;
      border-radius:6px;
      width:220px;
      font-size:13px;
      line-height:1.3;
      pointer-events:none;
    }

    .tooltip:after{
      content:"";
      position:absolute;
      left:18px;
      bottom:-6px;
      width:12px;
      height:12px;
      background:#111;
      transform:rotate(45deg);
    }

    /* overlap positions */
    .p1{ position:absolute; left:20px;  top:50px; }
    .p2{ position:absolute; left:170px; top:120px; }
    .p3{ position:absolute; left:90px;  top:240px; }

    .note{
      font-size:13px;
      color:#444;
      margin-top:10px;
    }
  </style>
</head>
<body>

  <h2>Task 42: Product Cards Tooltip (z-index)</h2>

  <div class="wrap">

    <div class="card p1" data-text="Headphones: Hover કરવાથી tooltip સૌથી ઉપર રહેશે.">
      <div class="tooltip"></div>
      <div class="img"></div>
      <h3>Wireless Headphones</h3>
      <p class="price">₹ 1,999</p>
    </div>

    <div class="card p2" data-text="Smart Watch: Cards overlap થાય છે એટલે tooltip માટે high z-index useful છે.">
      <div class="tooltip"></div>
      <div class="img" style="background:linear-gradient(135deg,#b6ffce,#ffe7a3);"></div>
      <h3>Smart Watch</h3>
      <p class="price">₹ 2,499</p>
    </div>

    <div class="card p3" data-text="Speaker: mouseenter પર tooltip z-index = 999 થાય છે.">
      <div class="tooltip"></div>
      <div class="img" style="background:linear-gradient(135deg,#d3c3ff,#ffb7d1);"></div>
      <h3>Bluetooth Speaker</h3>
      <p class="price">₹ 1,299</p>
    </div>

  </div>

  <div class="note">
    CSS: card z-index 10, tooltip z-index 20. <br>
    JS: mouseenter પર tooltip zIndex = 999 અને display = block.
  </div>

  <script>
    var cards = document.querySelectorAll(".card");

    cards.forEach(function(card){
      var tooltip = card.querySelector(".tooltip");
      tooltip.innerText = card.getAttribute("data-text");

      card.addEventListener("mouseenter", function(){
        tooltip.style.display = "block";
        tooltip.style.zIndex = 999;   // required
      });

      card.addEventListener("mouseleave", function(){
        tooltip.style.display = "none";
        tooltip.style.zIndex = 20;    // back to normal
      });
    });
  </script>

</body>
</html>
